name: Containerized Node App Deployment

on:
  push:
    branches: [main]

env:
  IMAGE_VERSION: ${{ github.run_number }}

jobs:
  build:
    runs-on: self-hosted

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Build Docker Image
        run: |
          docker build -t devopsmolvi/webimages:$IMAGE_VERSION .

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USER }}
          password: ${{ secrets.DOCKER_PASS }}

      - name: Push Image to Docker Hub
        run: |
          docker push devopsmolvi/webimages:$IMAGE_VERSION

      - name: Deploy Container
        run: |
          docker pull devopsmolvi/webimages:$IMAGE_VERSION

          docker stop webserver || true
          docker rm webserver || true

          docker run -d \
            --name webserver \
            --restart unless-stopped \
            -p 8080:8080 \
            devopsmolvi/webimages:$IMAGE_VERSION
